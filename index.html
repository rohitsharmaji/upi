<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free UPI QR Code Generator for India</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.hero {
  text-align:center;
  padding:100px 20px;
}

.hero h1 {
  font-size:48px;
}

.hero p {
  color:#cbd5f5;
}

/* BUTTON */
.btn {
  background: linear-gradient(45deg, #22c55e, #16a34a);
  color: #fff;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.section {
  padding:60px 20px;
}

input {
  padding:12px;
  margin:10px;
  width:90%;
  border-radius:6px;
  border:none;
}

.qr-box {
  margin-top:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Free UPI QR Code Generator for India</h1>
  <p>Create QR codes instantly for payments</p>

  <!-- 🔥 BACKLINK BUTTON -->
  <a href="https://rohitsharma.co/upi-qr-code-generator/" target="_blank" id="heroBtn">
    <button class="btn">Use UPI QR Generator 🚀</button>
  </a>
</div>

<!-- TOOL -->
<div class="section container">
<h2>Generate QR Code</h2>

<input type="text" id="upi" placeholder="Enter UPI ID">
<input type="text" id="name" placeholder="Enter Name">
<input type="number" id="amount" placeholder="Enter Amount">

<br>
<button class="btn" onclick="generateQR()">Generate QR Code</button>

<div class="qr-box" id="qr"></div>
</div>

<script>
function generateQR(){
 let upi=document.getElementById('upi').value;
 let name=document.getElementById('name').value;
 let amount=document.getElementById('amount').value;

 let url=`upi://pay?pa=${upi}&pn=${name}&am=${amount}&cu=INR`;

 document.getElementById('qr').innerHTML =
 `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}">`;

 // 🔥 SCROLL TO HERO BUTTON
 let hero = document.getElementById('heroBtn');
 hero.scrollIntoView({behavior:'smooth'});

 // 🔥 HIGHLIGHT EFFECT
 hero.style.boxShadow = "0 0 20px #22c55e";

 setTimeout(()=>{
   hero.style.boxShadow = "none";
 },2000);
}
</script>

</body>
</html>
